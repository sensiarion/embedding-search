# Hand-curated (query → expected_file) pairs for this repo.
#
# Used by `cargo xtask golden --corpus benchmarks/golden/this-repo.toml`.
# A query passes if the search result whose `file_path` matches `expected`
# appears within the configured top-k. The harness reports
# (mrr@k, recall@1, recall@5, ndcg@k) per model.
#
# Add new queries whenever a feature lands: each pair anchors a piece of
# the codebase to its conceptual NL phrasing — drift becomes visible
# in the next eval.

